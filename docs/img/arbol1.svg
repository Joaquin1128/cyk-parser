<svg width="100%" viewBox="0 0 1400 1100" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Árbol de parsing: {"ab":12}</title>
<desc>Árbol de derivación para el string {"ab":12} usando la gramática GLC diseñada</desc>
<defs>
  <style>
    text { font-family: "Anthropic Sans", sans-serif; font-size: 13px; fill: #2c2c2a; }
    .var { fill: #E6F1FB; stroke: #185FA5; }
    .ter { fill: #EAF3DE; stroke: #3B6D11; }
    .lbl { font-size: 13px; fill: #2c2c2a; font-weight: 500; }
    .tlbl { font-size: 12px; fill: #27500A; font-weight: 500; }
    .edge { stroke: #888780; stroke-width: 1; fill: none; }
  </style>
</defs>

<!-- ROOT: S -->
<rect class="var" x="640" y="20" width="60" height="28" rx="6" stroke-width="1"/>
<text class="lbl" x="670" y="39" text-anchor="middle">S</text>

<!-- Level 1: { A } -->
<rect class="ter" x="200" y="100" width="28" height="28" rx="4" stroke-width="1"/>
<text class="tlbl" x="214" y="119" text-anchor="middle">{</text>

<rect class="var" x="650" y="100" width="60" height="28" rx="6" stroke-width="1"/>
<text class="lbl" x="680" y="119" text-anchor="middle">A</text>

<rect class="ter" x="1140" y="100" width="28" height="28" rx="4" stroke-width="1"/>
<text class="tlbl" x="1154" y="119" text-anchor="middle">}</text>

<!-- Edges S -> { A } -->
<line class="edge" x1="670" y1="48" x2="214" y2="100"/>
<line class="edge" x1="670" y1="48" x2="680" y2="100"/>
<line class="edge" x1="670" y1="48" x2="1154" y2="100"/>

<!-- Level 2: A -> P (single pair, no B) -->
<rect class="var" x="650" y="180" width="60" height="28" rx="6" stroke-width="1"/>
<text class="lbl" x="680" y="199" text-anchor="middle">P</text>
<line class="edge" x1="680" y1="128" x2="680" y2="180"/>

<!-- Level 3: P -> " D " : E -->
<rect class="ter" x="300" y="260" width="28" height="28" rx="4" stroke-width="1"/>
<text class="tlbl" x="314" y="279" text-anchor="middle">"</text>

<rect class="var" x="500" y="260" width="60" height="28" rx="6" stroke-width="1"/>
<text class="lbl" x="530" y="279" text-anchor="middle">D</text>

<rect class="ter" x="700" y="260" width="28" height="28" rx="4" stroke-width="1"/>
<text class="tlbl" x="714" y="279" text-anchor="middle">"</text>

<rect class="ter" x="850" y="260" width="28" height="28" rx="4" stroke-width="1"/>
<text class="tlbl" x="864" y="279" text-anchor="middle">:</text>

<rect class="var" x="1020" y="260" width="60" height="28" rx="6" stroke-width="1"/>
<text class="lbl" x="1050" y="279" text-anchor="middle">E</text>

<!-- Edges P -> " D " : E -->
<line class="edge" x1="680" y1="208" x2="314" y2="260"/>
<line class="edge" x1="680" y1="208" x2="530" y2="260"/>
<line class="edge" x1="680" y1="208" x2="714" y2="260"/>
<line class="edge" x1="680" y1="208" x2="864" y2="260"/>
<line class="edge" x1="680" y1="208" x2="1050" y2="260"/>

<!-- Level 4a: D -> CD -->
<rect class="var" x="440" y="340" width="60" height="28" rx="6" stroke-width="1"/>
<text class="lbl" x="470" y="359" text-anchor="middle">C</text>

<rect class="var" x="560" y="340" width="60" height="28" rx="6" stroke-width="1"/>
<text class="lbl" x="590" y="359" text-anchor="middle">D</text>

<line class="edge" x1="530" y1="288" x2="470" y2="340"/>
<line class="edge" x1="530" y1="288" x2="590" y2="340"/>

<!-- Level 4b: E -> FE -->
<rect class="var" x="960" y="340" width="60" height="28" rx="6" stroke-width="1"/>
<text class="lbl" x="990" y="359" text-anchor="middle">F</text>

<rect class="var" x="1080" y="340" width="60" height="28" rx="6" stroke-width="1"/>
<text class="lbl" x="1110" y="359" text-anchor="middle">E</text>

<line class="edge" x1="1050" y1="288" x2="990" y2="340"/>
<line class="edge" x1="1050" y1="288" x2="1110" y2="340"/>

<!-- Level 5a: C -> 'a' -->
<rect class="ter" x="440" y="420" width="28" height="28" rx="4" stroke-width="1"/>
<text class="tlbl" x="454" y="439" text-anchor="middle">a</text>
<line class="edge" x1="470" y1="368" x2="454" y2="420"/>

<!-- Level 5b: D -> C -->
<rect class="var" x="560" y="420" width="60" height="28" rx="6" stroke-width="1"/>
<text class="lbl" x="590" y="439" text-anchor="middle">C</text>
<line class="edge" x1="590" y1="368" x2="590" y2="420"/>

<!-- Level 5c: F -> '1' -->
<rect class="ter" x="960" y="420" width="28" height="28" rx="4" stroke-width="1"/>
<text class="tlbl" x="974" y="439" text-anchor="middle">1</text>
<line class="edge" x1="990" y1="368" x2="974" y2="420"/>

<!-- Level 5d: E -> F -->
<rect class="var" x="1080" y="420" width="60" height="28" rx="6" stroke-width="1"/>
<text class="lbl" x="1110" y="439" text-anchor="middle">F</text>
<line class="edge" x1="1110" y1="368" x2="1110" y2="420"/>

<!-- Level 6a: C -> 'b' -->
<rect class="ter" x="560" y="500" width="28" height="28" rx="4" stroke-width="1"/>
<text class="tlbl" x="574" y="519" text-anchor="middle">b</text>
<line class="edge" x1="590" y1="448" x2="574" y2="500"/>

<!-- Level 6b: F -> '2' -->
<rect class="ter" x="1080" y="500" width="28" height="28" rx="4" stroke-width="1"/>
<text class="tlbl" x="1094" y="519" text-anchor="middle">2</text>
<line class="edge" x1="1110" y1="448" x2="1094" y2="500"/>

<!-- String display at bottom -->
<text x="700" y="620" text-anchor="middle" font-size="15" font-weight="500" fill="#3d3d3a">String: {"ab":12}</text>

<!-- Leyenda -->
<rect class="var" x="60" y="660" width="14" height="14" rx="3" stroke-width="1"/>
<text x="82" y="673" font-size="12" fill="#2c2c2a">Variable</text>
<rect class="ter" x="60" y="685" width="14" height="14" rx="3" stroke-width="1"/>
<text x="82" y="698" font-size="12" fill="#2c2c2a">Terminal</text>
</svg>
