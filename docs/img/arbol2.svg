<svg width="100%" viewBox="0 0 2000 920" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Árbol de parsing: {"a":1,"b":'hola'} - gramática corregida</title>
<desc>Árbol de derivación para el string {"a":1,"b":'hola'} con B -> ,P en lugar de B -> ,A</desc>
<defs>
  <style>
    text { font-family: "Anthropic Sans", sans-serif; font-size: 13px; fill: #2c2c2a; }
    .var { fill: #E6F1FB; stroke: #185FA5; }
    .ter { fill: #EAF3DE; stroke: #3B6D11; }
    .lbl { font-size: 13px; fill: #2c2c2a; font-weight: 500; }
    .tlbl { font-size: 12px; fill: #27500A; font-weight: 500; }
    .edge { stroke: #888780; stroke-width: 1; fill: none; }
    .changed { fill: #FAEEDA; stroke: #BA7517; }
    .chglbl { font-size: 13px; fill: #412402; font-weight: 500; }
  </style>
</defs>

<!-- ROOT: S -->
<rect class="var" x="950" y="20" width="60" height="28" rx="6" stroke-width="1"/>
<text class="lbl" x="980" y="39" text-anchor="middle">S</text>

<!-- Level 1: { A } -->
<rect class="ter" x="80" y="100" width="28" height="28" rx="4"/>
<text class="tlbl" x="94" y="119" text-anchor="middle">{</text>
<rect class="var" x="950" y="100" width="60" height="28" rx="6" stroke-width="1"/>
<text class="lbl" x="980" y="119" text-anchor="middle">A</text>
<rect class="ter" x="1880" y="100" width="28" height="28" rx="4"/>
<text class="tlbl" x="1894" y="119" text-anchor="middle">}</text>

<line class="edge" x1="980" y1="48" x2="94" y2="100"/>
<line class="edge" x1="980" y1="48" x2="980" y2="100"/>
<line class="edge" x1="980" y1="48" x2="1894" y2="100"/>

<!-- Level 2: A -> PB -->
<rect class="var" x="440" y="180" width="60" height="28" rx="6" stroke-width="1"/>
<text class="lbl" x="470" y="199" text-anchor="middle">P</text>
<rect class="var" x="1460" y="180" width="60" height="28" rx="6" stroke-width="1"/>
<text class="lbl" x="1490" y="199" text-anchor="middle">B</text>

<line class="edge" x1="980" y1="128" x2="470" y2="180"/>
<line class="edge" x1="980" y1="128" x2="1490" y2="180"/>

<!-- Level 3a: P -> " D " : E  (primer par: "a":1) -->
<rect class="ter" x="120" y="260" width="28" height="28" rx="4"/>
<text class="tlbl" x="134" y="279" text-anchor="middle">"</text>
<rect class="var" x="240" y="260" width="60" height="28" rx="6" stroke-width="1"/>
<text class="lbl" x="270" y="279" text-anchor="middle">D</text>
<rect class="ter" x="380" y="260" width="28" height="28" rx="4"/>
<text class="tlbl" x="394" y="279" text-anchor="middle">"</text>
<rect class="ter" x="480" y="260" width="28" height="28" rx="4"/>
<text class="tlbl" x="494" y="279" text-anchor="middle">:</text>
<rect class="var" x="580" y="260" width="60" height="28" rx="6" stroke-width="1"/>
<text class="lbl" x="610" y="279" text-anchor="middle">E</text>

<line class="edge" x1="470" y1="208" x2="134" y2="260"/>
<line class="edge" x1="470" y1="208" x2="270" y2="260"/>
<line class="edge" x1="470" y1="208" x2="394" y2="260"/>
<line class="edge" x1="470" y1="208" x2="494" y2="260"/>
<line class="edge" x1="470" y1="208" x2="610" y2="260"/>

<!-- Level 3b: B -> ,P  (CAMBIADO: antes era B -> ,A) -->
<rect class="ter" x="1340" y="260" width="28" height="28" rx="4"/>
<text class="tlbl" x="1354" y="279" text-anchor="middle">,</text>
<rect class="var" x="1460" y="260" width="60" height="28" rx="6" stroke-width="1"/>
<text class="lbl" x="1490" y="279" text-anchor="middle">P</text>

<line class="edge" x1="1490" y1="208" x2="1354" y2="260"/>
<line class="edge" x1="1490" y1="208" x2="1490" y2="260"/>

<!-- Level 4a: D -> C ('a') -->
<rect class="var" x="240" y="340" width="60" height="28" rx="6" stroke-width="1"/>
<text class="lbl" x="270" y="359" text-anchor="middle">C</text>
<line class="edge" x1="270" y1="288" x2="270" y2="340"/>

<!-- Level 4b: E -> F ('1') -->
<rect class="var" x="580" y="340" width="60" height="28" rx="6" stroke-width="1"/>
<text class="lbl" x="610" y="359" text-anchor="middle">F</text>
<line class="edge" x1="610" y1="288" x2="610" y2="340"/>

<!-- Level 4c: P -> " D " : ' V '  (segundo par: "b":'hola') -->
<rect class="ter" x="980" y="340" width="28" height="28" rx="4"/>
<text class="tlbl" x="994" y="359" text-anchor="middle">"</text>
<rect class="var" x="1060" y="340" width="60" height="28" rx="6" stroke-width="1"/>
<text class="lbl" x="1090" y="359" text-anchor="middle">D</text>
<rect class="ter" x="1180" y="340" width="28" height="28" rx="4"/>
<text class="tlbl" x="1194" y="359" text-anchor="middle">"</text>
<rect class="ter" x="1270" y="340" width="28" height="28" rx="4"/>
<text class="tlbl" x="1284" y="359" text-anchor="middle">:</text>
<rect class="ter" x="1360" y="340" width="28" height="28" rx="4"/>
<text class="tlbl" x="1374" y="359" text-anchor="middle">'</text>
<rect class="var" x="1460" y="340" width="60" height="28" rx="6" stroke-width="1"/>
<text class="lbl" x="1490" y="359" text-anchor="middle">V</text>
<rect class="ter" x="1580" y="340" width="28" height="28" rx="4"/>
<text class="tlbl" x="1594" y="359" text-anchor="middle">'</text>

<line class="edge" x1="1490" y1="288" x2="994" y2="340"/>
<line class="edge" x1="1490" y1="288" x2="1090" y2="340"/>
<line class="edge" x1="1490" y1="288" x2="1194" y2="340"/>
<line class="edge" x1="1490" y1="288" x2="1284" y2="340"/>
<line class="edge" x1="1490" y1="288" x2="1374" y2="340"/>
<line class="edge" x1="1490" y1="288" x2="1490" y2="340"/>
<line class="edge" x1="1490" y1="288" x2="1594" y2="340"/>

<!-- Level 5a: C -> 'a' -->
<rect class="ter" x="240" y="420" width="28" height="28" rx="4"/>
<text class="tlbl" x="254" y="439" text-anchor="middle">a</text>
<line class="edge" x1="270" y1="368" x2="254" y2="420"/>

<!-- Level 5b: F -> '1' -->
<rect class="ter" x="580" y="420" width="28" height="28" rx="4"/>
<text class="tlbl" x="594" y="439" text-anchor="middle">1</text>
<line class="edge" x1="610" y1="368" x2="594" y2="420"/>

<!-- Level 5c: D -> C ('b') -->
<rect class="var" x="1060" y="420" width="60" height="28" rx="6" stroke-width="1"/>
<text class="lbl" x="1090" y="439" text-anchor="middle">C</text>
<line class="edge" x1="1090" y1="368" x2="1090" y2="420"/>

<!-- Level 5d: V -> CV -->
<rect class="var" x="1400" y="420" width="60" height="28" rx="6" stroke-width="1"/>
<text class="lbl" x="1430" y="439" text-anchor="middle">C</text>
<rect class="var" x="1520" y="420" width="60" height="28" rx="6" stroke-width="1"/>
<text class="lbl" x="1550" y="439" text-anchor="middle">V</text>

<line class="edge" x1="1490" y1="368" x2="1430" y2="420"/>
<line class="edge" x1="1490" y1="368" x2="1550" y2="420"/>

<!-- Level 6: C->'b', C->'h', V->CV -->
<rect class="ter" x="1060" y="500" width="28" height="28" rx="4"/>
<text class="tlbl" x="1074" y="519" text-anchor="middle">b</text>
<line class="edge" x1="1090" y1="448" x2="1074" y2="500"/>

<rect class="ter" x="1400" y="500" width="28" height="28" rx="4"/>
<text class="tlbl" x="1414" y="519" text-anchor="middle">h</text>
<line class="edge" x1="1430" y1="448" x2="1414" y2="500"/>

<rect class="var" x="1480" y="500" width="60" height="28" rx="6" stroke-width="1"/>
<text class="lbl" x="1510" y="519" text-anchor="middle">C</text>
<rect class="var" x="1600" y="500" width="60" height="28" rx="6" stroke-width="1"/>
<text class="lbl" x="1630" y="519" text-anchor="middle">V</text>

<line class="edge" x1="1550" y1="448" x2="1510" y2="500"/>
<line class="edge" x1="1550" y1="448" x2="1630" y2="500"/>

<!-- Level 7: C->'o', V->CV -->
<rect class="ter" x="1480" y="580" width="28" height="28" rx="4"/>
<text class="tlbl" x="1494" y="599" text-anchor="middle">o</text>
<line class="edge" x1="1510" y1="528" x2="1494" y2="580"/>

<rect class="var" x="1560" y="580" width="60" height="28" rx="6" stroke-width="1"/>
<text class="lbl" x="1590" y="599" text-anchor="middle">C</text>
<rect class="var" x="1680" y="580" width="60" height="28" rx="6" stroke-width="1"/>
<text class="lbl" x="1710" y="599" text-anchor="middle">V</text>

<line class="edge" x1="1630" y1="528" x2="1590" y2="580"/>
<line class="edge" x1="1630" y1="528" x2="1710" y2="580"/>

<!-- Level 8: C->'l', V->CV -->
<rect class="ter" x="1560" y="660" width="28" height="28" rx="4"/>
<text class="tlbl" x="1574" y="679" text-anchor="middle">l</text>
<line class="edge" x1="1590" y1="608" x2="1574" y2="660"/>

<rect class="var" x="1640" y="660" width="60" height="28" rx="6" stroke-width="1"/>
<text class="lbl" x="1670" y="679" text-anchor="middle">C</text>
<rect class="var" x="1760" y="660" width="60" height="28" rx="6" stroke-width="1"/>
<text class="lbl" x="1790" y="679" text-anchor="middle">V</text>

<line class="edge" x1="1710" y1="608" x2="1670" y2="660"/>
<line class="edge" x1="1710" y1="608" x2="1790" y2="660"/>

<!-- Level 9: C->'a', V->CV -> C, V=ε implícito -->
<rect class="ter" x="1640" y="740" width="28" height="28" rx="4"/>
<text class="tlbl" x="1654" y="759" text-anchor="middle">a</text>
<line class="edge" x1="1670" y1="688" x2="1654" y2="740"/>

<!-- V tiene solo C, ya no tiene ε — mostramos C directamente -->
<rect class="var" x="1760" y="740" width="60" height="28" rx="6" stroke-width="1"/>
<text class="lbl" x="1790" y="759" text-anchor="middle">C</text>
<line class="edge" x1="1790" y1="688" x2="1790" y2="740"/>

<rect class="ter" x="1760" y="820" width="28" height="28" rx="4"/>
<text class="tlbl" x="1774" y="839" text-anchor="middle">∅</text>
<line class="edge" x1="1790" y1="768" x2="1774" y2="820"/>


<!-- String -->
<text x="980" y="895" text-anchor="middle" font-size="15" font-weight="500" fill="#3d3d3a">String: {"a":1,"b":'hola'}</text>

<!-- Leyenda -->
<rect class="var" x="60" y="855" width="14" height="14" rx="3" stroke-width="1"/>
<text x="82" y="868" font-size="12" fill="#2c2c2a">Variable</text>
<rect class="ter" x="180" y="855" width="14" height="14" rx="3" stroke-width="1"/>
<text x="202" y="868" font-size="12" fill="#2c2c2a">Terminal</text>
</svg>
